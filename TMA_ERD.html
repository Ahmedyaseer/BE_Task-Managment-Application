
<style>
#erd { padding: 12px 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2e2b4a' : '#EEEDFE',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    edgeLabelBackground: dark ? '#1e1e1e' : '#ffffff',
    attributeBackgroundColorEven: dark ? '#1a1a2e' : '#f5f4fe',
    attributeBackgroundColorOdd: dark ? '#22223a' : '#ffffff',
  },
});

const diagram = `erDiagram
  USERS {
    int Id PK
    string UserName
    string PasswordHash
    string Email
    int EmployeeId FK
    datetime CreatedAt
    datetime UpdatedAt
    string CreatedBy
    string UpdatedBy
  }
  ROLES {
    int Id PK
    string Name
    string Description
    datetime CreatedAt
    datetime UpdatedAt
    string CreatedBy
    string UpdatedBy
  }
  USER_ROLES {
    int UserId FK
    int RoleId FK
  }
  PERMISSIONS {
    int Id PK
    string Name
    datetime CreatedAt
    datetime UpdatedAt
    string CreatedBy
    string UpdatedBy
  }
  ROLE_PERMISSIONS {
    int RoleId FK
    int PermissionId FK
  }
  DEPARTMENTS {
    int Id PK
    string Name
    datetime CreatedAt
    datetime UpdatedAt
    string CreatedBy
    string UpdatedBy
  }
  EMPLOYEES {
    int Id PK
    string FirstName
    string LastName
    string JobTitle
    int DepartmentId FK
    datetime CreatedAt
    datetime UpdatedAt
    string CreatedBy
    string UpdatedBy
  }
  TASKS {
    int Id PK
    string Title
    string Description
    int DepartmentId FK
    int AssignedToId FK
    int TaskStatusId FK
    datetime CreatedAt
    datetime UpdatedAt
    string CreatedBy
    string UpdatedBy
  }
  TASK_STATUSES {
    int Id PK
    string Name
    datetime CreatedAt
    datetime UpdatedAt
    string CreatedBy
    string UpdatedBy
  }

  USERS ||--o{ USER_ROLES : "has"
  ROLES ||--o{ USER_ROLES : "assigned to"
  ROLES ||--o{ ROLE_PERMISSIONS : "has"
  PERMISSIONS ||--o{ ROLE_PERMISSIONS : "granted via"
  USERS }o--|| EMPLOYEES : "linked to"
  EMPLOYEES }o--|| DEPARTMENTS : "belongs to"
  TASKS }o--|| DEPARTMENTS : "categorised by"
  TASKS }o--|| EMPLOYEES : "assigned to"
  TASKS }o--|| TASK_STATUSES : "has status"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
